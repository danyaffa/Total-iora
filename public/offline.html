<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Total-iora — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #ede9fe);
      color: #0f172a;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    p {
      color: #475569;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 14px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #14b8a6);
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4F4;</div>
    <h1>You're Offline</h1>
    <p>Total-iora needs an internet connection for voice guidance and sacred notes. Please reconnect and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
